name: Run tests

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]

jobs:
  build:
    name: Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 2.2 on 3.10 is what styleseat currently runs in production
          # (officially unsupported by Django 2.2 but works in practice).
          - python-version: '3.10'
            django-version: '2.2'
          - python-version: '3.10'
            django-version: '3.2'
            coverage: true
          - python-version: '3.11'
            django-version: '3.2'
          - python-version: '3.11'
            django-version: '4.2'
          - python-version: '3.12'
            django-version: '4.2'
          - python-version: '3.12'
            django-version: '5.1'
          - python-version: '3.13'
            django-version: '5.1'

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install dependencies & project
        run: |
          pip install "Django~=${{ matrix.django-version }}.0"
          pip install -r requirements-test.py3.txt
          pip install -e .

      - name: Create test database
        run: python ${GITHUB_WORKSPACE}/satchless_test/manage.py migrate

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements-coverage.txt
          py.test --cov
          coveralls

      - name: Run tests
        if: ${{ ! matrix.coverage }}
        run: py.test
